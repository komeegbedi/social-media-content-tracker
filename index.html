<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F7F7F8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#08090A" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <title>IFC Creatives Board</title>
    <meta name="description" content="Creative workflow management for the IFC Creative Team." />
    <meta name="apple-mobile-web-app-title" content="Creatives Board" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta property="og:title" content="IFC Creatives Board" />
    <meta property="og:description" content="Creative workflow management for the IFC Creative Team." />
    <meta property="og:type" content="website" />
    <!-- Apply the saved appearance synchronously, before any paint, so there is
         never a light/dark flash on load. Mirrors src/theme.js (system default). -->
    <script>
      (function () {
        try {
          var p = localStorage.getItem("sb-appearance");
          if (p !== "system" && p !== "light" && p !== "dark") {
            var legacy = localStorage.getItem("sb-theme");
            p = (legacy === "light" || legacy === "dark") ? legacy : "system";
          }
          var dark = (p === "dark") || (p === "system" &&
            window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
        } catch (e) { /* no-op */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
